<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创业失败案例库 · 渔夫9年餐饮</title>
<meta name="description" content="1024+真实倒闭创业公司案例数据库。搜索你关心的行业，看看别人怎么死的，你就知道该怎么活。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#14110e;color:#f0e8d5;line-height:1.6}
a{color:#d4a040;text-decoration:none}a:hover{text-decoration:underline}

/* Header */
.header{display:flex;align-items:center;gap:20px;padding:12px 20px;border-bottom:1px solid #302418;font-size:13px;position:sticky;top:0;background:#14110e;z-index:100}
.header .logo{color:#f0e8d5;font-weight:700;font-size:15px;margin-right:auto;letter-spacing:-0.01em}
.header .logo a{color:#f0e8d5}.header nav{display:flex;gap:16px}.header nav a{color:#b8a888;font-size:13px}.header nav a:hover{color:#d4a040;text-decoration:none}

/* Hero */
.hero{max-width:1100px;margin:0 auto;padding:50px 20px 30px;text-align:center}
.hero-tag{color:#d4a040;font-size:12px;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:12px}
.hero h1{font-size:clamp(24px,4vw,38px);line-height:1.15;font-weight:800;letter-spacing:-0.03em;margin-bottom:14px;background:linear-gradient(135deg,#f0e8d5,#d4a040);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{max-width:600px;margin:0 auto 8px;color:#b8a888;font-size:15px;line-height:1.75}

/* Stats */
.stats{display:flex;justify-content:center;gap:32px;margin:24px 0 32px;flex-wrap:wrap}
.stats .stat{text-align:center}.stats .num{font-size:24px;font-weight:800;color:#d4a040}.stats .label{font-size:11px;color:#6b5f4f;margin-top:2px}

/* Filters */
.filters{max-width:1100px;margin:0 auto;padding:0 20px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 14px 10px 36px;background:#1e1912;border:1px solid #302418;border-radius:8px;color:#f0e8d5;font-size:14px;outline:none}
.search-box input:focus{border-color:#d4a040}.search-box input::placeholder{color:#6b5f4f}
.search-box::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}
select{padding:10px 14px;background:#1e1912;border:1px solid #302418;border-radius:8px;color:#f0e8d5;font-size:13px;outline:none;cursor:pointer}
select:focus{border-color:#d4a040}

/* Results */
.results-bar{max-width:1100px;margin:0 auto;padding:0 20px 12px;font-size:13px;color:#6b5f4f}
.results-bar span{color:#d4a040;font-weight:600}

/* Cards */
.card-list{max-width:1100px;margin:0 auto;padding:0 20px 60px;display:grid;gap:16px}
.card{background:rgba(30,25,18,0.8);border:1px solid #302418;border-radius:10px;padding:20px;cursor:pointer;transition:border-color 0.2s}
.card:hover{border-color:#d4a040}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-head h3{font-size:16px;font-weight:700;color:#f0e8d5}
.card-industry{font-size:11px;color:#d4a040;background:rgba(212,160,64,0.12);padding:2px 8px;border-radius:12px;white-space:nowrap}
.card-summary{color:#b8a888;font-size:13px;line-height:1.7;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:16px;font-size:12px;color:#6b5f4f;flex-wrap:wrap}
.card-meta .funding{color:#d4a040;font-weight:600}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;overflow-y:auto;padding:20px}
.modal-overlay.active{display:flex;justify-content:center;align-items:flex-start}
.modal{background:#1a1612;border:1px solid #302418;border-radius:12px;max-width:800px;width:100%;margin:40px auto;padding:32px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#b8a888;font-size:24px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modal-close:hover{background:rgba(255,255,255,0.1);color:#f0e8d5}
.modal h2{font-size:22px;font-weight:700;margin-bottom:6px;padding-right:40px}
.modal .modal-industry{font-size:12px;color:#d4a040;margin-bottom:16px;display:inline-block;background:rgba(212,160,64,0.12);padding:3px 10px;border-radius:12px}
.modal .modal-meta{display:flex;gap:20px;margin-bottom:20px;font-size:13px;color:#6b5f4f;flex-wrap:wrap}
.modal .modal-meta .val{color:#f0e8d5;font-weight:600}
.modal .section-label{font-size:12px;color:#d4a040;letter-spacing:1px;text-transform:uppercase;margin:20px 0 10px;font-weight:600}
.modal .modal-summary{color:#b8a888;font-size:14px;line-height:1.8}
.modal .modal-lessons{color:#f0e8d5;font-size:14px;line-height:1.9;white-space:pre-wrap}

/* Pagination */
.pagination{max-width:1100px;margin:0 auto;padding:0 20px 40px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.pagination button{padding:8px 14px;background:#1e1912;border:1px solid #302418;border-radius:6px;color:#b8a888;font-size:13px;cursor:pointer}
.pagination button:hover{border-color:#d4a040;color:#d4a040}
.pagination button.active{background:#d4a040;color:#14110e;border-color:#d4a040;font-weight:600}
.pagination button:disabled{opacity:0.3;cursor:default}

/* Footer */
.footer{max-width:1100px;margin:0 auto;padding:20px;border-top:1px solid #302418;text-align:center;font-size:12px;color:#6b5f4f}

@media(max-width:640px){.hero{padding:30px 16px 20px}.hero h1{font-size:22px}.filters{flex-direction:column}.card-list{padding:0 16px 40px}.stats{gap:20px}.modal{padding:20px;margin:20px auto}}
</style>
</head>
<body>

<header class="header">
  <span class="logo"><a href="../">🐷 渔夫9年餐饮</a></span>
  <nav>
    <a href="../">首页</a>
    <a href="../scanner/">合同扫描</a>
    <a href="../calculator/">盈亏计算</a>
    <a href="../articles/">文章</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-tag">创业避坑案例库</div>
  <h1>从别人烧掉的钱里，学会怎么不烧自己的钱</h1>
  <p>每一家倒下的企业，都留下了一个可以研究、可以复盘、可以避开的陷阱。</p>
</section>

<div class="stats">
  <div class="stat"><div class="num" id="totalCount">1024</div><div class="label">已收录案例</div></div>
  <div class="stat"><div class="num">$515.6B</div><div class="label">蒸发资本</div></div>
  <div class="stat"><div class="num">11</div><div class="label">行业分类</div></div>
</div>

<div class="filters">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索公司名、行业、关键词...">
  </div>
  <select id="industryFilter">
    <option value="">全部行业</option>
  </select>
  <select id="countryFilter">
    <option value="">全部国家</option>
  </select>
  <select id="sortFilter">
    <option value="closed_desc">关闭时间 ↓</option>
    <option value="closed_asc">关闭时间 ↑</option>
    <option value="funding_desc">融资额 ↓</option>
    <option value="funding_asc">融资额 ↑</option>
    <option value="name_asc">公司名 A-Z</option>
  </select>
</div>

<div class="results-bar">共 <span id="resultCount">1024</span> 条</div>

<div class="card-list" id="cardList"></div>

<div class="pagination" id="pagination"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">×</button>
    <h2 id="modalTitle"></h2>
    <span class="modal-industry" id="modalIndustry"></span>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="section-label">📋 案例摘要</div>
    <div class="modal-summary" id="modalSummary"></div>
    <div class="section-label">💡 关键教训</div>
    <div class="modal-lessons" id="modalLessons"></div>
  </div>
</div>

<footer class="footer">
  渔夫9年餐饮 · 创业避坑指南 — 数据来源：公开报道整理，仅供学习研究<br>
  案例数据 1024 条 · 最后更新：2026/7/8
</footer>

<script>
let DATA = [];
let filtered = [];
const PER_PAGE = 20;
let currentPage = 1;

const COUNTRY_MAP = {CN:'中国',US:'美国',IN:'印度',GB:'英国',DE:'德国',FR:'法国',JP:'日本',KR:'韩国',BR:'巴西',SG:'新加坡',AU:'澳大利亚',CA:'加拿大',NL:'荷兰',SE:'瑞典',DK:'丹麦',IL:'以色列',AE:'阿联酋',RU:'俄罗斯',MX:'墨西哥',NG:'尼日利亚',ID:'印尼',TH:'泰国',PH:'菲律宾',VN:'越南',MY:'马来西亚'};

function formatFunding(n) {
  if (!n) return '未知';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(0) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n;
}

function initFilters() {
  const industries = {};
  const countries = {};
  DATA.forEach(c => {
    if (c.industry_label) industries[c.industry] = c.industry_label;
    if (c.country) {
      const name = COUNTRY_MAP[c.country] || c.country;
      countries[c.country] = name;
    }
  });
  const indSel = document.getElementById('industryFilter');
  Object.entries(industries).sort((a,b) => a[1].localeCompare(b[1])).forEach(([k,v]) => {
    const count = DATA.filter(c => c.industry === k).length;
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = v + ' (' + count + ')';
    indSel.appendChild(opt);
  });
  const cntSel = document.getElementById('countryFilter');
  Object.entries(countries).sort((a,b) => b[1].localeCompare(a[1])).forEach(([k,v]) => {
    const count = DATA.filter(c => c.country === k).length;
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = v + ' (' + count + ')';
    cntSel.appendChild(opt);
  });
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const ind = document.getElementById('industryFilter').value;
  const cnt = document.getElementById('countryFilter').value;
  const sort = document.getElementById('sortFilter').value;

  filtered = DATA.filter(c => {
    if (ind && c.industry !== ind) return false;
    if (cnt && c.country !== cnt) return false;
    if (q) {
      const text = (c.company + ' ' + c.industry_label + ' ' + c.summary + ' ' + (c.key_lessons||'')).toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    switch(sort) {
      case 'closed_desc': return (b.closed||0) - (a.closed||0);
      case 'closed_asc': return (a.closed||0) - (b.closed||0);
      case 'funding_desc': return (b.funding||0) - (a.funding||0);
      case 'funding_asc': return (a.funding||0) - (b.funding||0);
      case 'name_asc': return a.company.localeCompare(b.company);
    }
    return 0;
  });

  currentPage = 1;
  render();
}

function render() {
  document.getElementById('resultCount').textContent = filtered.length;
  const list = document.getElementById('cardList');
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);

  list.innerHTML = page.map((c, i) => {
    const country = c.country ? (COUNTRY_MAP[c.country] || c.country) : '未知';
    return `<div class="card" data-idx="${start+i}">
      <div class="card-head">
        <h3>${c.company}</h3>
        <span class="card-industry">${c.industry_label}</span>
      </div>
      <div class="card-summary">${c.summary}</div>
      <div class="card-meta">
        <span class="funding">${formatFunding(c.funding)}</span>
        <span>成立 ${c.founded || '?'}</span>
        <span>关闭 ${c.closed || '?'}</span>
        <span>${country}</span>
      </div>
    </div>`;
  }).join('');

  // Pagination
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const pag = document.getElementById('pagination');
  let btns = '';
  btns += `<button ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">上一页</button>`;
  const range = [];
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || Math.abs(p - currentPage) <= 2) range.push(p);
    else if (range[range.length-1] !== '...') range.push('...');
  }
  range.forEach(p => {
    if (p === '...') btns += `<button disabled>...</button>`;
    else btns += `<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  btns += `<button ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})">下一页</button>`;
  pag.innerHTML = btns;

  // Card click
  list.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => showModal(parseInt(card.dataset.idx)));
  });

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goPage(p) { currentPage = p; render(); }

function showModal(idx) {
  const c = filtered[idx];
  if (!c) return;
  const country = c.country ? (COUNTRY_MAP[c.country] || c.country) : '未知';
  document.getElementById('modalTitle').textContent = c.company;
  document.getElementById('modalIndustry').textContent = c.industry_label;
  document.getElementById('modalMeta').innerHTML = `
    <span>融资：<span class="val">${formatFunding(c.funding)}</span></span>
    <span>成立：<span class="val">${c.founded || '?'}</span></span>
    <span>关闭：<span class="val">${c.closed || '?'}</span></span>
    <span>国家：<span class="val">${country}</span></span>`;
  document.getElementById('modalSummary').textContent = c.summary || '暂无摘要';
  document.getElementById('modalLessons').textContent = c.key_lessons || '暂无教训记录';
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// Search debounce
let timer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(timer); timer = setTimeout(applyFilters, 300);
});
document.getElementById('industryFilter').addEventListener('change', applyFilters);
document.getElementById('countryFilter').addEventListener('change', applyFilters);
document.getElementById('sortFilter').addEventListener('change', applyFilters);

// Load data
fetch('api.json').then(r => r.json()).then(d => {
  DATA = d.cases || [];
  document.getElementById('totalCount').textContent = DATA.length;
  filtered = [...DATA];
  initFilters();
  render();
}).catch(e => {
  document.getElementById('cardList').innerHTML = '<div style="text-align:center;padding:40px;color:#b8a888">数据加载失败，请刷新页面重试</div>';
});
</script>

</body>
</html>
